<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}寻根溯源{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        body {
            background-color: #f8f9fa;
        }

        .card {
            margin-bottom: 1rem;
        }

        /* === 族谱图样式 === */
        .pedigree-chart {
            overflow-x: auto;
            padding: 20px 10px;
        }

        /* 每个家庭单元：血系成员 + 配偶 */
        .family-unit {
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        /* 成员卡片 */
        .member-card {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 13px;
            white-space: nowrap;
            border: 1.5px solid #dee2e6;
            background: #fff;
            line-height: 1.5;
        }

        .member-card.male {
            border-color: #0d6efd;
            background: #f0f6ff;
        }

        .member-card.female {
            border-color: #d63384;
            background: #fff0f6;
        }

        .member-card.spouse-card {
            border-style: dashed;
        }

        .member-card.spouse-card.blood-member {
            border-style: solid;
            border-color: #198754;
            background: #f0fff4;
        }

        .member-card .card-name {
            font-weight: 600;
        }

        .member-card .card-info {
            font-size: 11px;
            color: #6c757d;
        }

        /* 婚姻连接符 */
        .marriage-link {
            font-weight: bold;
            color: #dc3545;
            font-size: 14px;
            user-select: none;
        }

        /* 树形布局：使用 flex 嵌套 */
        .pedigree-tree {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 子女容器 */
        .children-row {
            display: flex;
            justify-content: center;
            gap: 20px;
            position: relative;
            padding-top: 20px;
            margin-top: 8px;
        }

        /* 连接线：从父节点到横线的竖线 */
        .children-row::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            width: 1px;
            height: 20px;
            background: #adb5bd;
        }

        /* 每个子节点分支 */
        .child-branch {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            padding-top: 20px;
        }

        /* 子节点上方的竖线（从横线到子节点） */
        .child-branch::before {
            content: '';
            position: absolute;
            top: 0;
            width: 1px;
            height: 20px;
            background: #adb5bd;
        }

        /* 横线连接多个子节点 */
        .children-row.connected>.child-branch::after {
            content: '';
            position: absolute;
            top: 0;
            height: 1px;
            background: #adb5bd;
        }

        .children-row.connected>.child-branch:first-child::after {
            left: 50%;
            right: -10px;
        }

        .children-row.connected>.child-branch:last-child::after {
            left: -10px;
            right: 50%;
        }

        .children-row.connected>.child-branch:not(:first-child):not(:last-child)::after {
            left: -10px;
            right: -10px;
        }

        .children-row.connected>.child-branch:only-child::after {
            display: none;
        }

        /* 折叠/展开按钮 */
        .tree-toggle {
            cursor: pointer;
            user-select: none;
            display: inline-block;
            width: 18px;
            height: 18px;
            text-align: center;
            line-height: 18px;
            font-size: 11px;
            border-radius: 50%;
            color: #6c757d;
            background: #e9ecef;
            margin-left: 6px;
        }

        .tree-toggle:hover {
            color: #0d6efd;
            background: #dee2e6;
        }

        /* 滚动条美化 */
        .pedigree-chart::-webkit-scrollbar {
            height: 8px;
        }

        .pedigree-chart::-webkit-scrollbar-thumb {
            background: #ced4da;
            border-radius: 4px;
        }

        .pedigree-chart::-webkit-scrollbar-track {
            background: #f8f9fa;
        }
    </style>
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="/">寻根溯源</a>
            <div class="navbar-nav ms-auto">
                <span class="navbar-text me-3" id="username"></span>
                <button class="btn btn-outline-light btn-sm" onclick="logout()">登出</button>
            </div>
        </div>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
    <script>
        // 通用的 API 请求函数
        async function api(url, method = 'GET', body = null) {
            const options = { method, headers: { 'Content-Type': 'application/json' } };
            if (body) options.body = JSON.stringify(body);
            const resp = await fetch(url, options);
            return await resp.json();
        }

        // 检查登录状态
        async function checkLogin() {
            const data = await api('/api/me');
            if (data.error) {
                window.location.href = '/';
            } else {
                document.getElementById('username').textContent = data.username;
            }
        }

        // 登出
        async function logout() {
            await api('/api/logout', 'POST');
            window.location.href = '/';
        }
    </script>
    {% block scripts %}{% endblock %}
</body>

</html>
