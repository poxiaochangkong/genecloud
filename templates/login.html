{% extends 'base.html' %}
{% block title %}登录 - 寻根溯源{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-body">
                <h3 class="card-title text-center mb-4">寻根溯源 · 族谱管理系统</h3>

                <!-- 登录表单 -->
                <div id="login-form">
                    <h5>登录</h5>
                    <div class="mb-3">
                        <input type="text" class="form-control" id="login-username" placeholder="用户名">
                    </div>
                    <div class="mb-3">
                        <input type="password" class="form-control" id="login-password" placeholder="密码">
                    </div>
                    <button class="btn btn-primary w-100" onclick="doLogin()">登录</button>
                    <p class="text-center mt-3">
                        <a href="#" onclick="showRegister()">没有账号？注册</a>
                    </p>
                </div>

                <!-- 注册表单 -->
                <div id="register-form" style="display:none;">
                    <h5>注册</h5>
                    <div class="mb-3">
                        <input type="text" class="form-control" id="reg-username" placeholder="用户名（2-20个字符）">
                    </div>
                    <div class="mb-3">
                        <input type="password" class="form-control" id="reg-password" placeholder="密码（至少6位）">
                    </div>
                    <div class="mb-3">
                        <input type="email" class="form-control" id="reg-email" placeholder="邮箱（选填）">
                    </div>
                    <button class="btn btn-success w-100" onclick="doRegister()">注册</button>
                    <p class="text-center mt-3">
                        <a href="#" onclick="showLogin()">已有账号？登录</a>
                    </p>
                </div>

                <div id="error-msg" class="alert alert-danger mt-3" style="display:none;"></div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    function showRegister() {
        document.getElementById('login-form').style.display = 'none';
        document.getElementById('register-form').style.display = 'block';
        hideError();
    }
    function showLogin() {
        document.getElementById('login-form').style.display = 'block';
        document.getElementById('register-form').style.display = 'none';
        hideError();
    }
    function showError(msg) {
        const el = document.getElementById('error-msg');
        el.textContent = msg;
        el.style.display = 'block';
    }
    function hideError() {
        document.getElementById('error-msg').style.display = 'none';
    }

    async function doLogin() {
        hideError();
        const username = document.getElementById('login-username').value;
        const password = document.getElementById('login-password').value;
        const data = await api('/api/login', 'POST', { username, password });
        if (data.error) {
            showError(data.error);
        } else {
            window.location.href = '/';
        }
    }

    async function doRegister() {
        hideError();
        const username = document.getElementById('reg-username').value;
        const password = document.getElementById('reg-password').value;
        const email = document.getElementById('reg-email').value;
        const data = await api('/api/register', 'POST', { username, password, email });
        if (data.error) {
            showError(data.error);
        } else {
            alert('注册成功，请登录');
            showLogin();
        }
    }
</script>
{% endblock %}
