{% extends 'base.html' %}
{% block title %}族谱详情{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h2 id="genealogy-title">族谱详情</h2>
    <a href="/genealogies" class="btn btn-outline-secondary">返回</a>
</div>

<!-- 搜索栏 -->
<div class="card mb-3">
    <div class="card-body">
        <div class="input-group">
            <input type="text" class="form-control" id="search-keyword" placeholder="输入姓名搜索...">
            <button class="btn btn-outline-primary" onclick="doSearch()">搜索</button>
            <button class="btn btn-outline-secondary" onclick="loadMembers(1)">全部</button>
        </div>
    </div>
</div>

<!-- 添加成员表单 -->
<div class="card mb-3">
    <div class="card-body">
        <h5>添加成员</h5>
        <div class="row g-2">
            <div class="col-md-2">
                <input type="text" class="form-control" id="m-name" placeholder="姓名">
            </div>
            <div class="col-md-1">
                <select class="form-select" id="m-gender">
                    <option value="M">男</option>
                    <option value="F">女</option>
                </select>
            </div>
            <div class="col-md-2">
                <input type="number" class="form-control" id="m-birth" placeholder="出生年">
            </div>
            <div class="col-md-2">
                <input type="number" class="form-control" id="m-death" placeholder="死亡年">
            </div>
            <div class="col-md-2">
                <input type="text" class="form-control" id="m-bio" placeholder="简介">
            </div>
            <div class="col-md-1">
                <button class="btn btn-success" onclick="addMember()">添加</button>
            </div>
        </div>
    </div>
</div>

<!-- 成员列表 -->
<div id="member-list"></div>

<!-- 树形预览 -->
<div class="card mb-3">
    <div class="card-body">
        <h5>族谱树形预览</h5>
        <div class="d-flex align-items-center gap-2 mb-2">
            <label class="form-label mb-0">显示代数：</label>
            <div class="input-group input-group-sm" style="width:180px;">
                <input type="number" class="form-control" id="tree-depth" value="3" min="1" max="30" placeholder="代数">
                <button class="btn btn-outline-secondary dropdown-toggle" type="button"
                    data-bs-toggle="dropdown">快捷</button>
                <ul class="dropdown-menu dropdown-menu-end">
                    <li><a class="dropdown-item" href="#"
                            onclick="document.getElementById('tree-depth').value='3';loadTree();return false;">3代</a>
                    </li>
                    <li><a class="dropdown-item" href="#"
                            onclick="document.getElementById('tree-depth').value='5';loadTree();return false;">5代</a>
                    </li>
                    <li><a class="dropdown-item" href="#"
                            onclick="document.getElementById('tree-depth').value='7';loadTree();return false;">7代</a>
                    </li>
                    <li><a class="dropdown-item" href="#"
                            onclick="document.getElementById('tree-depth').value='10';loadTree();return false;">10代</a>
                    </li>
                    <li><a class="dropdown-item" href="#"
                            onclick="document.getElementById('tree-depth').value='15';loadTree();return false;">15代</a>
                    </li>
                    <li><a class="dropdown-item" href="#"
                            onclick="document.getElementById('tree-depth').value='20';loadTree();return false;">20代</a>
                    </li>
                    <li><a class="dropdown-item" href="#"
                            onclick="document.getElementById('tree-depth').value='30';loadTree();return false;">30代</a>
                    </li>
                </ul>
            </div>
            <button class="btn btn-outline-primary btn-sm" onclick="loadTree()">加载树形图</button>
            <span class="text-muted" style="font-size:0.85em;">可输入1-30的任意代数</span>
        </div>
        <div id="tree-view" class="pedigree-chart"></div>
    </div>
</div>

<!-- 关系操作 -->
<div class="card mb-3">
    <div class="card-body">
        <h5>建立亲子关系</h5>
        <div class="row g-2">
            <div class="col-md-3">
                <input type="number" class="form-control" id="link-child" placeholder="子女ID">
            </div>
            <div class="col-md-3">
                <input type="number" class="form-control" id="link-parent" placeholder="父母ID">
            </div>
            <div class="col-md-2">
                <select class="form-select" id="link-type">
                    <option value="father">父亲</option>
                    <option value="mother">母亲</option>
                </select>
            </div>
            <div class="col-md-2">
                <button class="btn btn-warning" onclick="addLink()">建立关系</button>
            </div>
        </div>
    </div>
</div>

<!-- 建立配偶关系 -->
<div class="card mb-3">
    <div class="card-body">
        <h5>建立配偶关系</h5>
        <div class="row g-2">
            <div class="col-md-3">
                <input type="number" class="form-control" id="marriage-member1" placeholder="成员1 ID">
            </div>
            <div class="col-md-3">
                <input type="number" class="form-control" id="marriage-member2" placeholder="成员2 ID">
            </div>
            <div class="col-md-2">
                <input type="number" class="form-control" id="marriage-year" placeholder="结婚年份（可选）">
            </div>
            <div class="col-md-2">
                <button class="btn btn-info" onclick="addMarriage()">建立关系</button>
            </div>
        </div>
    </div>
</div>

<!-- 查询祖先/后代（改进为树形展示） -->
<div class="card mb-3">
    <div class="card-body">
        <h5>查询祖先/后代</h5>
        <div class="row g-2">
            <div class="col-md-3">
                <input type="number" class="form-control" id="query-ancestor-id" placeholder="成员ID">
            </div>
            <div class="col-md-2">
                <button class="btn btn-info" onclick="queryAncestors()">查询祖先</button>
            </div>
            <div class="col-md-2">
                <button class="btn btn-info" onclick="queryDescendants()">查询后代</button>
            </div>
        </div>
        <div id="ancestor-result" class="mt-3"></div>
    </div>
</div>

<!-- 查询亲缘关系 -->
<div class="card mb-3">
    <div class="card-body">
        <h5>查询亲缘关系</h5>
        <div class="row g-2">
            <div class="col-md-3">
                <input type="number" class="form-control" id="kinship-a" placeholder="成员A的ID">
            </div>
            <div class="col-md-3">
                <input type="number" class="form-control" id="kinship-b" placeholder="成员B的ID">
            </div>
            <div class="col-md-2">
                <button class="btn btn-danger" onclick="queryKinship()">查询</button>
            </div>
        </div>
        <div id="kinship-result" class="mt-3"></div>
    </div>
</div>

<!-- ============================================ -->
<!-- PPT要求的SQL查询：统计面板 -->
<!-- ============================================ -->
<div class="card mb-3">
    <div class="card-body">
        <h5>📊 SQL统计分析</h5>
        <div class="row g-2 mb-3">
            <div class="col-md-3">
                <button class="btn btn-primary w-100" onclick="queryLifespanByGen()">
                    ① 平均寿命最长的辈分
                </button>
            </div>
            <div class="col-md-3">
                <button class="btn btn-warning w-100" onclick="queryOldMalesNoSpouse()">
                    ② 50岁以上无配偶男性
                </button>
            </div>
            <div class="col-md-3">
                <button class="btn btn-info w-100" onclick="queryBornBeforeGenAvg()">
                    ③ 出生早于辈分平均值
                </button>
            </div>
            <div class="col-md-3">
                <button class="btn btn-outline-secondary w-100" onclick="queryGenerationDetails()">
                    ④ 各代统计概览
                </button>
            </div>
        </div>
        <div id="sql-stats-result"></div>
    </div>
</div>

<!-- 权限管理 -->
<div class="card mb-3">
    <div class="card-body">
        <h5>权限管理</h5>
        <button class="btn btn-outline-primary btn-sm mb-2" onclick="loadPermissions()">查看权限</button>
        <div id="permission-list" class="mb-3"></div>
        <div class="row g-2">
            <div class="col-md-3">
                <input type="text" class="form-control" id="perm-username" placeholder="用户名">
            </div>
            <div class="col-md-2">
                <select class="form-select" id="perm-role">
                    <option value="editor">3级-编辑者</option>
                    <option value="owner">2级-所有者</option>
                </select>
            </div>
            <div class="col-md-2">
                <button class="btn btn-success" onclick="grantPermission()">赋予权限</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    const GENEALOGY_ID = {{ genealogy_id }};
    let currentPage = 1;
    const PAGE_SIZE = 50;
    let totalMembers = 0;

    checkLogin();
    loadMembers(1);

    async function loadMembers(page) {
        currentPage = page || 1;
        const data = await api(`/api/genealogies/${GENEALOGY_ID}/members?page=${currentPage}&page_size=${PAGE_SIZE}`);
        if (data.error) { alert(data.error); return; }
        // data = {members: [...], total: N, page: N, page_size: N}
        const members = data.members || [];
        totalMembers = data.total || 0;
        renderMembers(members, data.total, data.page, data.page_size);
    }

    async function doSearch() {
        const keyword = document.getElementById('search-keyword').value;
        if (!keyword.trim()) { loadMembers(1); return; }
        const data = await api(`/api/genealogies/${GENEALOGY_ID}/members/search?keyword=${encodeURIComponent(keyword)}`);
        if (data.error) { alert(data.error); return; }
        // search returns plain array (limited to 100)
        totalMembers = 0;
        renderMembers(data, 0, 0, 0, true);
    }

    function renderMembers(members, total, page, pageSize, isSearch) {
        const container = document.getElementById('member-list');
        if (!Array.isArray(members) || members.length === 0) {
            container.innerHTML = '<p class="text-muted">暂无成员。</p>';
            return;
        }

        // Build table
        let html = '<table class="table table-striped"><thead><tr>'
            + '<th>ID</th><th>姓名</th><th>性别</th><th>出生年</th><th>死亡年</th><th>操作</th>'
            + '</tr></thead><tbody>' + members.map(m => `
            <tr>
                <td>${m.member_id}</td>
                <td>${m.name}</td>
                <td>${m.gender === 'M' ? '男' : '女'}</td>
                <td>${m.birth_year || '-'}</td>
                <td>${m.death_year || '在世'}</td>
                <td>
                    <a href="/members/${m.member_id}"
                       class="btn btn-sm btn-outline-primary">详情</a>
                    <button class="btn btn-sm btn-outline-secondary"
                            onclick="editMember(${m.member_id})">编辑</button>
                    <button class="btn btn-sm btn-outline-danger"
                            onclick="deleteMember(${m.member_id}, this)">删除</button>
                </td>
            </tr>
        `).join('') + '</tbody></table>';

        // Pagination controls (only for paginated mode, not search)
        if (!isSearch && total > pageSize) {
            const totalPages = Math.ceil(total / pageSize);
            html += '<nav><ul class="pagination pagination-sm">';
            // Previous
            html += `<li class="page-item ${page <= 1 ? 'disabled' : ''}">
                <a class="page-link" href="#" onclick="loadMembers(${page - 1});return false;">上一页</a></li>`;
            // Page numbers (show max 7 pages around current)
            let startPage = Math.max(1, page - 3);
            let endPage = Math.min(totalPages, startPage + 6);
            if (endPage - startPage < 6) startPage = Math.max(1, endPage - 6);
            if (startPage > 1) {
                html += `<li class="page-item"><a class="page-link" href="#" onclick="loadMembers(1);return false;">1</a></li>`;
                if (startPage > 2) html += '<li class="page-item disabled"><span class="page-link">...</span></li>';
            }
            for (let i = startPage; i <= endPage; i++) {
                html += `<li class="page-item ${i === page ? 'active' : ''}">
                    <a class="page-link" href="#" onclick="loadMembers(${i});return false;">${i}</a></li>`;
            }
            if (endPage < totalPages) {
                if (endPage < totalPages - 1) html += '<li class="page-item disabled"><span class="page-link">...</span></li>';
                html += `<li class="page-item"><a class="page-link" href="#" onclick="loadMembers(${totalPages});return false;">${totalPages}</a></li>`;
            }
            // Next
            html += `<li class="page-item ${page >= totalPages ? 'disabled' : ''}">
                <a class="page-link" href="#" onclick="loadMembers(${page + 1});return false;">下一页</a></li>`;
            html += '</ul>';
            html += `<span class="text-muted ms-2">共 ${total.toLocaleString()} 条，第 ${page}/${totalPages} 页</span>`;
            html += '</nav>';
        } else if (!isSearch && total > 0) {
            html += `<p class="text-muted">共 ${total} 条</p>`;
        }

        container.innerHTML = html;
    }

    async function addMember() {
        const data = {
            name: document.getElementById('m-name').value,
            gender: document.getElementById('m-gender').value,
            birth_year: parseInt(document.getElementById('m-birth').value) || null,
            death_year: parseInt(document.getElementById('m-death').value) || null,
            bio: document.getElementById('m-bio').value,
        };
        const result = await api(`/api/genealogies/${GENEALOGY_ID}/members`, 'POST', data);
        if (result.error) { alert(result.error); return; }
        loadMembers(currentPage);
    }

    // ============ 编辑 / 删除成员 ============
    async function editMember(memberId) {
        const data = await api(`/api/members/${memberId}`);
        if (data.error) { alert(data.error); return; }

        const name = prompt('姓名：', data.name);
        if (!name) return;
        const gender = prompt('性别（M/F）：', data.gender);
        if (!gender || (gender !== 'M' && gender !== 'F')) { alert('性别须为 M 或 F'); return; }
        const birthYear = prompt('出生年（留空不填）：', data.birth_year || '');
        const deathYear = prompt('死亡年（留空不填）：', data.death_year || '');
        const bio = prompt('简介：', data.bio || '');

        const payload = {
            name: name,
            gender: gender,
            birth_year: parseInt(birthYear) || null,
            death_year: parseInt(deathYear) || null,
            bio: bio,
        };
        const result = await api(`/api/members/${memberId}`, 'PUT', payload);
        if (result.error) { alert(result.error); return; }
        loadMembers(currentPage);
    }

    async function deleteMember(memberId, btn) {
        if (!confirm('确定要删除该成员吗？此操作不可恢复！')) return;
        btn.disabled = true;
        btn.textContent = '删除中...';
        const result = await api(`/api/members/${memberId}`, 'DELETE');
        if (result.error) { alert(result.error); btn.disabled = false; btn.textContent = '删除'; return; }
        loadMembers(currentPage);
    }

    async function addLink() {
        const data = {
            child_id: parseInt(document.getElementById('link-child').value),
            parent_id: parseInt(document.getElementById('link-parent').value),
            relation_type: document.getElementById('link-type').value,
        };
        const result = await api('/api/relations/link', 'POST', data);
        if (result.error) { alert(result.error); return; }
        alert('关系建立成功');
    }

    // ============ 建立配偶关系 ============
    async function addMarriage() {
        const member1 = parseInt(document.getElementById('marriage-member1').value);
        const member2 = parseInt(document.getElementById('marriage-member2').value);
        const yearInput = document.getElementById('marriage-year').value;
        const marriageYear = yearInput ? parseInt(yearInput) : null;

        if (!member1 || !member2) {
            alert('请输入两个成员的ID');
            return;
        }

        const result = await api('/api/relations/marriage', 'POST', {
            member_id1: member1,
            member_id2: member2,
            marriage_year: marriageYear,
        });
        if (result.error) { alert(result.error); return; }
        alert('配偶关系建立成功');
        // Clear form inputs
        document.getElementById('marriage-member1').value = '';
        document.getElementById('marriage-member2').value = '';
        document.getElementById('marriage-year').value = '';
    }

    // ============ 祖先/后代查询（树形展示） ============
    async function queryAncestors() {
        const id = document.getElementById('query-ancestor-id').value;
        const data = await api(`/api/members/${id}/ancestors`);
        renderTreeHierarchical(data, 'ancestor-result', '祖先', true);
    }

    async function queryDescendants() {
        const id = document.getElementById('query-ancestor-id').value;
        const data = await api(`/api/members/${id}/descendants`);
        renderTreeHierarchical(data, 'ancestor-result', '后代', false);
    }

    /**
     * 以缩进树形结构渲染祖先/后代查询结果
     * direction: true=祖先(从本人到远祖), false=后代(从本人到末代)
     */
    function renderTreeHierarchical(data, containerId, label, direction) {
        const container = document.getElementById(containerId);
        if (data.error) {
            container.innerHTML = `<div class="alert alert-warning">${data.error}</div>`;
            return;
        }
        if (!Array.isArray(data) || data.length === 0) {
            container.innerHTML = '<p class="text-muted">无数据</p>';
            return;
        }

        // Group members by generation
        const genMap = {};
        let maxGen = 0;
        data.forEach(m => {
            const gen = m.generation || 1;
            if (!genMap[gen]) genMap[gen] = [];
            genMap[gen].push(m);
            if (gen > maxGen) maxGen = gen;
        });

        // Build HTML with indented tree structure
        const icon = direction ? '↑' : '↓';
        const arrow = direction ? '← 向上追溯' : '→ 向下展开';

        let html = `<h6>${label}${arrow}：</h6>`;
        html += '<div class="tree-indent-view">';

        for (let gen = 1; gen <= maxGen; gen++) {
            const members = genMap[gen] || [];
            const indentPx = (gen - 1) * 28;
            const genLabel = direction
                ? `第${gen}代 ${gen === 1 ? '(本人)' : '(第' + gen + '世祖先)'}`
                : `第${gen}代 ${gen === 1 ? '(本人)' : '(第' + gen + '世后代)'}`;

            html += `<div class="tree-gen-row" style="padding-left: ${indentPx}px;">`;
            html += `<span class="tree-gen-badge">${icon} ${genLabel}</span>`;

            members.forEach(m => {
                const genderIcon = m.gender === 'M' ? '♂' : '♀';
                const genderClass = m.gender === 'M' ? 'text-primary' : 'text-danger';
                const lifespan = m.death_year
                    ? `(${m.birth_year || '?'}-${m.death_year})`
                    : (m.birth_year ? `(${m.birth_year}-在世)` : '');
                const relTag = m.relation_type
                    ? `<span class="tree-rel-tag">${m.relation_type === 'father' ? '父' : '母'}</span>`
                    : '';

                html += `<span class="tree-person ${genderClass}">`
                    + `${relTag}${genderIcon} ${m.name}`
                    + `<small class="text-muted">${lifespan}</small>`
                    + `</span>`;
            });

            html += '</div>';
        }

        html += '</div>';
        container.innerHTML = html;
    }

    async function queryKinship() {
        const a = document.getElementById('kinship-a').value;
        const b = document.getElementById('kinship-b').value;
        const data = await api(`/api/relations/kinship?member_a=${a}&member_b=${b}`);
        const container = document.getElementById('kinship-result');
        if (data.error) { container.innerHTML = `<div class="alert alert-warning">${data.error}</div>`; return; }

        const chainANames = data.path_a.map(p => p.name);
        const chainBNames = data.path_b.map(p => p.name).reverse().slice(1);

        const arrowUp = ' → ';
        const arrowDown = ' ← ';
        let fullChain;
        if (chainBNames.length === 0) {
            fullChain = chainANames.join(arrowUp);
        } else {
            fullChain = chainANames.join(arrowUp) + arrowDown + chainBNames.join(arrowDown);
        }

        container.innerHTML = `
            <div class="alert alert-success">
                <strong>最近共同祖先：</strong>${data.common_ancestor} (ID: ${data.common_ancestor_id})<br>
                <strong>A到祖先的距离：</strong>${data.path_a.length - 1} 代<br>
                <strong>B到祖先的距离：</strong>${data.path_b.length - 1} 代<br>
                <strong>完整链路：</strong>
                ${fullChain}
            </div>`;
    }

    // ============ 族谱图预览（支持折叠/展开） ============
    let collapseState = {};
    let treeDataCache = null;

    async function loadTree() {
        const depth = document.getElementById('tree-depth').value || 3;
        const data = await api(`/api/genealogies/${GENEALOGY_ID}/tree?depth=${depth}`);
        const container = document.getElementById('tree-view');
        if (data.error) { container.innerHTML = `<div class="alert alert-warning">${data.error}</div>`; return; }
        if (!Array.isArray(data) || data.length === 0) {
            container.innerHTML = '<p class="text-muted">暂无成员数据。</p>';
            return;
        }
        collapseState = {};
        treeDataCache = data;
        initCollapse(data);
        container.innerHTML = renderPedigreeForest(data);
    }

    function initCollapse(nodes) {
        nodes.forEach(n => {
            if (n.children && n.children.length > 0) {
                collapseState[n.member_id] = false;
                initCollapse(n.children);
            }
        });
    }

    function toggleCollapse(memberId) {
        collapseState[memberId] = !collapseState[memberId];
        if (treeDataCache) {
            const container = document.getElementById('tree-view');
            container.innerHTML = renderPedigreeForest(treeDataCache);
        }
    }

    function renderPedigreeForest(roots) {
        return '<div class="pedigree-tree">' + roots.map(r => renderPedigreeNode(r)).join('') + '</div>';
    }

    function renderPedigreeNode(node) {
        const hasChildren = node.children && node.children.length > 0;
        const isCollapsed = collapseState[node.member_id];
        const familyUnitHtml = renderFamilyUnit(node);

        let childrenHtml = '';
        if (hasChildren && !isCollapsed) {
            const connectedClass = node.children.length > 1 ? ' connected' : '';
            childrenHtml = `<div class="children-row${connectedClass}">`
                + node.children.map(c => `<div class="child-branch">${renderPedigreeNode(c)}</div>`).join('')
                + '</div>';
        }

        return familyUnitHtml + childrenHtml;
    }

    function renderFamilyUnit(node) {
        const memberCard = renderMemberCard(node, false);

        let spouseCard = '';
        if (node.spouse) {
            const link = '<span class="marriage-link"> ⚬ </span>';
            spouseCard = link + renderMemberCard(node.spouse, true);
        }

        let toggleBtn = '';
        if ((node.children && node.children.length > 0) || node.has_more_children) {
            const symbol = collapseState[node.member_id] ? '+' : '−';
            toggleBtn = `<span class="tree-toggle" onclick="toggleCollapse(${node.member_id})">${symbol}</span>`;
        }

        let moreBadge = '';
        if (node.has_more_children && (!node.children || node.children.length === 0)) {
            moreBadge = '<span class="badge bg-secondary ms-1">...</span>';
        }

        return `<div class="family-unit">${memberCard}${spouseCard}${toggleBtn}${moreBadge}</div>`;
    }

    function renderMemberCard(m, isSpouse) {
        const genderClass = m.gender === 'M' ? 'male' : 'female';
        const genderIcon = m.gender === 'M' ? '♂' : '♀';
        let classes = `member-card ${genderClass}`;
        if (isSpouse) {
            classes += ' spouse-card';
            if (m.is_blood_member) {
                classes += ' blood-member';
            }
        }

        const lifespan = m.death_year
            ? `${m.birth_year || '?'}-${m.death_year}`
            : (m.birth_year ? `${m.birth_year}-` : '');

        const infoParts = [lifespan];
        if (isSpouse && m.marriage_year) {
            infoParts.push(`婚${m.marriage_year}`);
        }

        const title = isSpouse
            ? (m.is_blood_member ? '族内成员/配偶' : '配偶')
            : '';

        return `<span class="${classes}" title="${title}">`
            + `<span class="card-name">${genderIcon} ${m.name}</span>`
            + (infoParts.some(p => p) ? `<span class="card-info"> ${infoParts.filter(p => p).join(' ')}</span>` : '')
            + '</span>';
    }

    // ============================================
    // 统计查询通用分页渲染
    // ============================================

    function renderStatsPagination(page, totalPages, total, callbackName) {
        if (totalPages <= 1) {
            return `<p class="text-muted mt-2 mb-0">共 ${total} 条</p>`;
        }
        let html = '<nav class="mt-2"><ul class="pagination pagination-sm">';
        // Previous
        html += `<li class="page-item ${page <= 1 ? 'disabled' : ''}">
            <a class="page-link" href="#" onclick="${callbackName}(${page - 1});return false;">上一页</a></li>`;
        // Page numbers
        let startPage = Math.max(1, page - 3);
        let endPage = Math.min(totalPages, startPage + 6);
        if (endPage - startPage < 6) startPage = Math.max(1, endPage - 6);
        if (startPage > 1) {
            html += `<li class="page-item"><a class="page-link" href="#" onclick="${callbackName}(1);return false;">1</a></li>`;
            if (startPage > 2) html += '<li class="page-item disabled"><span class="page-link">...</span></li>';
        }
        for (let i = startPage; i <= endPage; i++) {
            html += `<li class="page-item ${i === page ? 'active' : ''}">
                <a class="page-link" href="#" onclick="${callbackName}(${i});return false;">${i}</a></li>`;
        }
        if (endPage < totalPages) {
            if (endPage < totalPages - 1) html += '<li class="page-item disabled"><span class="page-link">...</span></li>';
            html += `<li class="page-item"><a class="page-link" href="#" onclick="${callbackName}(${totalPages});return false;">${totalPages}</a></li>`;
        }
        // Next
        html += `<li class="page-item ${page >= totalPages ? 'disabled' : ''}">
            <a class="page-link" href="#" onclick="${callbackName}(${page + 1});return false;">下一页</a></li>`;
        html += '</ul>';
        html += `<span class="text-muted ms-2">共 ${total.toLocaleString()} 条，第 ${page}/${totalPages} 页</span>`;
        html += '</nav>';
        return html;
    }

    // ============================================
    // PPT要求的SQL查询：前端调用
    // ============================================

    async function queryLifespanByGen() {
        const data = await api(`/api/genealogies/${GENEALOGY_ID}/stats/lifespan-by-gen`);
        const container = document.getElementById('sql-stats-result');
        if (data.error) {
            container.innerHTML = `<div class="alert alert-warning">${data.error}</div>`;
            return;
        }
        container.innerHTML = `
            <div class="alert alert-success">
                <h6>① 平均寿命最长的辈分</h6>
                <table class="table table-sm table-bordered mb-0">
                    <thead><tr><th>辈分（第几代）</th><th>人数</th><th>平均寿命（岁）</th></tr></thead>
                    <tbody>
                        <tr>
                            <td><strong>第 ${data.generation} 代</strong></td>
                            <td>${data.member_count}</td>
                            <td><strong class="text-success">${data.avg_lifespan} 岁</strong></td>
                        </tr>
                    </tbody>
                </table>
            </div>`;
    }

    async function queryOldMalesNoSpouse(page) {
        page = page || 1;
        const data = await api(`/api/genealogies/${GENEALOGY_ID}/stats/old-males-no-spouse?page=${page}&page_size=${PAGE_SIZE}`);
        const container = document.getElementById('sql-stats-result');
        if (data.error) {
            container.innerHTML = `<div class="alert alert-warning">${data.error}</div>`;
            return;
        }
        const rows = data.data || [];
        if (!rows.length) {
            container.innerHTML = `<div class="alert alert-info">没有找到年龄超过50岁且无配偶的男性成员。</div>`;
            return;
        }
        const totalPages = Math.ceil(data.total / data.page_size);
        container.innerHTML = `
            <div class="alert alert-warning">
                <h6>② 年龄超过50岁且无配偶的男性成员（共 ${data.total} 人）</h6>
                <p class="text-muted mb-1"><small>年龄计算：在世 = 当前年 - 出生年，已故 = 死亡年 - 出生年（即寿命）</small></p>
                <table class="table table-sm table-bordered mb-0">
                    <thead><tr><th>ID</th><th>姓名</th><th>出生年</th><th>死亡年</th><th>年龄</th><th>状态</th></tr></thead>
                    <tbody>
                        ${rows.map(m => `
                        <tr>
                            <td>${m.member_id}</td>
                            <td>${m.name}</td>
                            <td>${m.birth_year || '-'}</td>
                            <td>${m.death_year || '在世'}</td>
                            <td><strong>${m.age}</strong></td>
                            <td><span class="badge ${m.status === '在世' ? 'bg-success' : 'bg-secondary'}">${m.status}</span></td>
                        </tr>`).join('')}
                    </tbody>
                </table>
                ${renderStatsPagination(data.page, totalPages, data.total, 'queryOldMalesNoSpouse')}
            </div>`;
    }

    async function queryBornBeforeGenAvg(page) {
        page = page || 1;
        const data = await api(`/api/genealogies/${GENEALOGY_ID}/stats/born-before-gen-avg?page=${page}&page_size=${PAGE_SIZE}`);
        const container = document.getElementById('sql-stats-result');
        if (data.error) {
            container.innerHTML = `<div class="alert alert-warning">${data.error}</div>`;
            return;
        }
        const rows = data.data || [];
        if (!rows.length) {
            container.innerHTML = `<div class="alert alert-info">所有成员的出生年份都不低于其辈分平均值。</div>`;
            return;
        }

        // Group by generation for better readability
        const genGroups = {};
        rows.forEach(m => {
            if (!genGroups[m.generation]) genGroups[m.generation] = [];
            genGroups[m.generation].push(m);
        });

        let tableRows = '';
        Object.keys(genGroups).sort((a, b) => a - b).forEach(gen => {
            genGroups[gen].forEach((m, idx) => {
                tableRows += `<tr>
                    ${idx === 0 ? `<td rowspan="${genGroups[gen].length}"><strong>第${gen}代</strong><br><small class="text-muted">平均: ${m.avg_birth_year}年</small></td>` : ''}
                    <td>${m.member_id}</td>
                    <td>${m.name}</td>
                    <td>${m.gender === 'M' ? '♂' : '♀'}</td>
                    <td><strong class="text-warning">${m.birth_year}</strong> <small class="text-muted">(-${(m.avg_birth_year - m.birth_year).toFixed(1)}年)</small></td>
                </tr>`;
            });
        });

        const totalPages = Math.ceil(data.total / data.page_size);
        container.innerHTML = `
            <div class="alert alert-info">
                <h6>③ 出生年份早于该辈分平均出生年份的成员（共 ${data.total} 人）</h6>
                <table class="table table-sm table-bordered mb-0">
                    <thead><tr><th>辈分</th><th>ID</th><th>姓名</th><th>性别</th><th>出生年（差值）</th></tr></thead>
                    <tbody>${tableRows}</tbody>
                </table>
                ${renderStatsPagination(data.page, totalPages, data.total, 'queryBornBeforeGenAvg')}
            </div>`;
    }

    async function queryGenerationDetails() {
        const data = await api(`/api/genealogies/${GENEALOGY_ID}/stats/generation-details`);
        const container = document.getElementById('sql-stats-result');
        if (data.error) {
            container.innerHTML = `<div class="alert alert-warning">${data.error}</div>`;
            return;
        }
        if (!Array.isArray(data) || data.length === 0) {
            container.innerHTML = `<div class="alert alert-info">暂无各代统计数据。</div>`;
            return;
        }
        container.innerHTML = `
            <div class="alert alert-secondary">
                <h6>④ 各代统计概览（共 ${data.length} 代）</h6>
                <table class="table table-sm table-bordered mb-0">
                    <thead><tr><th>辈分</th><th>人数</th><th>平均出生年</th><th>平均寿命（岁）</th></tr></thead>
                    <tbody>
                        ${data.map(m => `
                        <tr>
                            <td><strong>第${m.generation}代</strong></td>
                            <td>${m.member_count}</td>
                            <td>${m.avg_birth_year}</td>
                            <td>${m.avg_lifespan !== null ? m.avg_lifespan : '-'}</td>
                        </tr>`).join('')}
                    </tbody>
                </table>
            </div>`;
    }

    // ============ 权限管理 ============
    async function loadPermissions() {
        const data = await api(`/api/genealogies/${GENEALOGY_ID}/permissions`);
        const container = document.getElementById('permission-list');
        if (data.error) { container.innerHTML = `<div class="alert alert-warning">${data.error}</div>`; return; }
        if (!Array.isArray(data) || data.length === 0) {
            container.innerHTML = '<p class="text-muted">暂无权限记录</p>';
            return;
        }
        const roleNames = { 'admin': '1级-管理员', 'owner': '2级-所有者', 'editor': '3级-编辑者' };
        container.innerHTML = '<table class="table table-sm"><thead><tr><th>用户</th><th>权限级别</th><th>操作</th></tr></thead><tbody>'
            + data.map(p => `
                <tr>
                    <td>${p.username}</td>
                    <td>${roleNames[p.role] || p.role}</td>
                    <td><button class="btn btn-sm btn-outline-danger" onclick="revokePermission(${p.user_id})">撤销</button></td>
                </tr>
            `).join('') + '</tbody></table>';
    }

    async function grantPermission() {
        const username = document.getElementById('perm-username').value;
        const role = document.getElementById('perm-role').value;
        if (!username) { alert('请输入用户名'); return; }
        const result = await api(`/api/genealogies/${GENEALOGY_ID}/permissions`, 'POST', { username, role });
        if (result.error) { alert(result.error); return; }
        loadPermissions();
    }

    async function revokePermission(targetUserId) {
        if (!confirm('确定要撤销该用户的权限吗？')) return;
        const result = await api(`/api/genealogies/${GENEALOGY_ID}/permissions/${targetUserId}`, 'DELETE');
        if (result.error) { alert(result.error); return; }
        loadPermissions();
    }
</script>
