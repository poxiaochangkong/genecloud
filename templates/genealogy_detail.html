{% extends 'base.html' %}
{% block title %}族谱详情{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h2 id="genealogy-title">族谱详情</h2>
    <a href="/genealogies" class="btn btn-outline-secondary">返回</a>
</div>

<!-- 搜索栏 -->
<div class="card mb-3">
    <div class="card-body">
        <div class="input-group">
            <input type="text" class="form-control" id="search-keyword" placeholder="输入姓名搜索...">
            <button class="btn btn-outline-primary" onclick="doSearch()">搜索</button>
            <button class="btn btn-outline-secondary" onclick="loadMembers()">全部</button>
        </div>
    </div>
</div>

<!-- 添加成员表单 -->
<div class="card mb-3">
    <div class="card-body">
        <h5>添加成员</h5>
        <div class="row g-2">
            <div class="col-md-2">
                <input type="text" class="form-control" id="m-name" placeholder="姓名">
            </div>
            <div class="col-md-1">
                <select class="form-select" id="m-gender">
                    <option value="M">男</option>
                    <option value="F">女</option>
                </select>
            </div>
            <div class="col-md-2">
                <input type="number" class="form-control" id="m-birth" placeholder="出生年">
            </div>
            <div class="col-md-2">
                <input type="number" class="form-control" id="m-death" placeholder="死亡年">
            </div>
            <div class="col-md-2">
                <input type="text" class="form-control" id="m-bio" placeholder="简介">
            </div>
            <div class="col-md-1">
                <button class="btn btn-success" onclick="addMember()">添加</button>
            </div>
        </div>
    </div>
</div>

<!-- 成员列表 -->
<div id="member-list"></div>

<!-- 树形预览 -->
<div class="card mb-3">
    <div class="card-body">
        <h5>族谱树形预览</h5>
        <button class="btn btn-outline-primary btn-sm mb-2" onclick="loadTree()">加载树形图</button>
        <div id="tree-view" class="pedigree-chart"></div>
    </div>
</div>

<!-- 关系操作 -->
<div class="card mb-3">
    <div class="card-body">
        <h5>建立亲子关系</h5>
        <div class="row g-2">
            <div class="col-md-3">
                <input type="number" class="form-control" id="link-child" placeholder="子女ID">
            </div>
            <div class="col-md-3">
                <input type="number" class="form-control" id="link-parent" placeholder="父母ID">
            </div>
            <div class="col-md-2">
                <select class="form-select" id="link-type">
                    <option value="father">父亲</option>
                    <option value="mother">母亲</option>
                </select>
            </div>
            <div class="col-md-2">
                <button class="btn btn-warning" onclick="addLink()">建立关系</button>
            </div>
        </div>
    </div>
</div>

<!-- 查询祖先 -->
<div class="card mb-3">
    <div class="card-body">
        <h5>查询祖先/后代</h5>
        <div class="row g-2">
            <div class="col-md-3">
                <input type="number" class="form-control" id="query-ancestor-id" placeholder="成员ID">
            </div>
            <div class="col-md-2">
                <button class="btn btn-info" onclick="queryAncestors()">查询祖先</button>
            </div>
            <div class="col-md-2">
                <button class="btn btn-info" onclick="queryDescendants()">查询后代</button>
            </div>
        </div>
        <div id="ancestor-result" class="mt-3"></div>
    </div>
</div>

<!-- 查询亲缘关系 -->
<div class="card mb-3">
    <div class="card-body">
        <h5>查询亲缘关系</h5>
        <div class="row g-2">
            <div class="col-md-3">
                <input type="number" class="form-control" id="kinship-a" placeholder="成员A的ID">
            </div>
            <div class="col-md-3">
                <input type="number" class="form-control" id="kinship-b" placeholder="成员B的ID">
            </div>
            <div class="col-md-2">
                <button class="btn btn-danger" onclick="queryKinship()">查询</button>
            </div>
        </div>
        <div id="kinship-result" class="mt-3"></div>
    </div>
</div>

<!-- 权限管理 -->
<div class="card mb-3">
    <div class="card-body">
        <h5>权限管理</h5>
        <button class="btn btn-outline-primary btn-sm mb-2" onclick="loadPermissions()">查看权限</button>
        <div id="permission-list" class="mb-3"></div>
        <div class="row g-2">
            <div class="col-md-3">
                <input type="text" class="form-control" id="perm-username" placeholder="用户名">
            </div>
            <div class="col-md-2">
                <select class="form-select" id="perm-role">
                    <option value="editor">3级-编辑者</option>
                    <option value="owner">2级-所有者</option>
                </select>
            </div>
            <div class="col-md-2">
                <button class="btn btn-success" onclick="grantPermission()">赋予权限</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    const GENEALOGY_ID = {{ genealogy_id }};
    checkLogin();
    loadMembers();

    async function loadMembers() {
        const data = await api(`/api/genealogies/${GENEALOGY_ID}/members`);
        renderMembers(data);
    }

    async function doSearch() {
        const keyword = document.getElementById('search-keyword').value;
        const data = await api(`/api/genealogies/${GENEALOGY_ID}/members/search?keyword=${keyword}`);
        renderMembers(data);
    }

    function renderMembers(members) {
        const container = document.getElementById('member-list');
        if (!Array.isArray(members) || members.length === 0) {
            container.innerHTML = '<p class="text-muted">暂无成员。</p>';
            return;
        }
        container.innerHTML = '<table class="table table-striped"><thead><tr>'
            + '<th>ID</th><th>姓名</th><th>性别</th><th>出生年</th><th>死亡年</th><th>操作</th>'
            + '</tr></thead><tbody>' + members.map(m => `
            <tr>
                <td>${m.member_id}</td>
                <td>${m.name}</td>
                <td>${m.gender === 'M' ? '男' : '女'}</td>
                <td>${m.birth_year || '-'}</td>
                <td>${m.death_year || '在世'}</td>
                <td>
                    <a href="/members/${m.member_id}"
                       class="btn btn-sm btn-outline-primary">详情</a>
                    <button class="btn btn-sm btn-outline-secondary"
                            onclick="editMember(${m.member_id})">编辑</button>
                    <button class="btn btn-sm btn-outline-danger"
                            onclick="deleteMember(${m.member_id}, this)">删除</button>
                </td>
            </tr>
        `).join('') + '</tbody></table>';
    }

    async function addMember() {
        const data = {
            name: document.getElementById('m-name').value,
            gender: document.getElementById('m-gender').value,
            birth_year: parseInt(document.getElementById('m-birth').value) || null,
            death_year: parseInt(document.getElementById('m-death').value) || null,
            bio: document.getElementById('m-bio').value,
        };
        const result = await api(`/api/genealogies/${GENEALOGY_ID}/members`, 'POST', data);
        if (result.error) { alert(result.error); return; }
        loadMembers();
    }

    // ============ 编辑 / 删除成员 ============
    async function editMember(memberId) {
        // 获取当前成员数据
        const data = await api(`/api/members/${memberId}`);
        if (data.error) { alert(data.error); return; }

        const name = prompt('姓名：', data.name);
        if (!name) return;
        const gender = prompt('性别（M/F）：', data.gender);
        if (!gender || (gender !== 'M' && gender !== 'F')) { alert('性别须为 M 或 F'); return; }
        const birthYear = prompt('出生年（留空不填）：', data.birth_year || '');
        const deathYear = prompt('死亡年（留空不填）：', data.death_year || '');
        const bio = prompt('简介：', data.bio || '');

        const payload = {
            name: name,
            gender: gender,
            birth_year: parseInt(birthYear) || null,
            death_year: parseInt(deathYear) || null,
            bio: bio,
        };
        const result = await api(`/api/members/${memberId}`, 'PUT', payload);
        if (result.error) { alert(result.error); return; }
        loadMembers();
    }

    async function deleteMember(memberId, btn) {
        if (!confirm('确定要删除该成员吗？此操作不可恢复！')) return;
        btn.disabled = true;
        btn.textContent = '删除中...';
        const result = await api(`/api/members/${memberId}`, 'DELETE');
        if (result.error) { alert(result.error); btn.disabled = false; btn.textContent = '删除'; return; }
        loadMembers();
    }

    async function addLink() {
        const data = {
            child_id: parseInt(document.getElementById('link-child').value),
            parent_id: parseInt(document.getElementById('link-parent').value),
            relation_type: document.getElementById('link-type').value,
        };
        const result = await api('/api/relations/link', 'POST', data);
        if (result.error) { alert(result.error); return; }
        alert('关系建立成功');
    }

    async function queryAncestors() {
        const id = document.getElementById('query-ancestor-id').value;
        const data = await api(`/api/members/${id}/ancestors`);
        renderTree(data, 'ancestor-result', '祖先');
    }

    async function queryDescendants() {
        const id = document.getElementById('query-ancestor-id').value;
        const data = await api(`/api/members/${id}/descendants`);
        renderTree(data, 'ancestor-result', '后代');
    }

    function renderTree(data, containerId, label) {
        const container = document.getElementById(containerId);
        if (data.error) { container.innerHTML = `<div class="alert alert-warning">${data.error}</div>`; return; }
        if (!Array.isArray(data) || data.length === 0) {
            container.innerHTML = '<p class="text-muted">无数据</p>';
            return;
        }
        let html = '<h6>' + label + '列表：</h6><ul>';
        data.forEach(m => {
            const indent = '  '.repeat((m.generation || 1) - 1);
            html += `<li>${indent}[第${m.generation}代] ${m.name}
                     (${m.gender === 'M' ? '男' : '女'}, ${m.birth_year || '?'})</li>`;
        });
        html += '</ul>';
        container.innerHTML = html;
    }

    async function queryKinship() {
        const a = document.getElementById('kinship-a').value;
        const b = document.getElementById('kinship-b').value;
        const data = await api(`/api/relations/kinship?member_a=${a}&member_b=${b}`);
        const container = document.getElementById('kinship-result');
        if (data.error) { container.innerHTML = `<div class="alert alert-warning">${data.error}</div>`; return; }
        container.innerHTML = `
            <div class="alert alert-success">
                <strong>最近共同祖先：</strong>${data.common_ancestor} (ID: ${data.common_ancestor_id})<br>
                <strong>A到祖先的距离：</strong>${data.path_a.length} 代<br>
                <strong>B到祖先的距离：</strong>${data.path_b.length} 代<br>
                <strong>完整链路：</strong>
                ${data.path_a.map(p => p.name).join(' → ')}
                ← ${data.common_ancestor} →
                ${data.path_b.map(p => p.name).reverse().join(' → ')}
            </div>`;
    }

    // ============ 族谱图预览（支持折叠/展开） ============
    let collapseState = {};  // member_id -> true=collapsed, false=expanded
    let treeDataCache = null;  // cache tree data for re-render on toggle

    async function loadTree() {
        const data = await api(`/api/genealogies/${GENEALOGY_ID}/tree`);
        const container = document.getElementById('tree-view');
        if (data.error) { container.innerHTML = `<div class="alert alert-warning">${data.error}</div>`; return; }
        if (!Array.isArray(data) || data.length === 0) {
            container.innerHTML = '<p class="text-muted">暂无成员数据。</p>';
            return;
        }
        // Initialize collapse state: default expanded
        collapseState = {};
        treeDataCache = data;
        initCollapse(data);

        // Render the pedigree chart
        container.innerHTML = renderPedigreeForest(data);
    }

    function initCollapse(nodes) {
        nodes.forEach(n => {
            if (n.children && n.children.length > 0) {
                collapseState[n.member_id] = false; // false = expanded
                initCollapse(n.children);
            }
        });
    }

    function toggleCollapse(memberId) {
        collapseState[memberId] = !collapseState[memberId];
        // Re-render the entire chart
        if (treeDataCache) {
            const container = document.getElementById('tree-view');
            container.innerHTML = renderPedigreeForest(treeDataCache);
        }
    }

    // Render multiple root trees (forest)
    function renderPedigreeForest(roots) {
        return '<div class="pedigree-tree">' + roots.map(r => renderPedigreeNode(r)).join('') + '</div>';
    }

    // Render a single pedigree node: family-unit + children
    function renderPedigreeNode(node) {
        const hasChildren = node.children && node.children.length > 0;
        const isCollapsed = collapseState[node.member_id];

        // Family unit: blood member [+ marriage link + spouse]
        const familyUnitHtml = renderFamilyUnit(node);

        // Children row
        let childrenHtml = '';
        if (hasChildren && !isCollapsed) {
            const connectedClass = node.children.length > 1 ? ' connected' : '';
            childrenHtml = `<div class="children-row${connectedClass}">`
                + node.children.map(c => `<div class="child-branch">${renderPedigreeNode(c)}</div>`).join('')
                + '</div>';
        }

        return familyUnitHtml + childrenHtml;
    }

    // Render a family unit: [blood member card] [marriage link] [spouse card] [toggle]
    function renderFamilyUnit(node) {
        const memberCard = renderMemberCard(node, false);

        let spouseCard = '';
        if (node.spouse) {
            const link = '<span class="marriage-link"> ⚬ </span>';
            spouseCard = link + renderMemberCard(node.spouse, true);
        }

        let toggleBtn = '';
        if (node.children && node.children.length > 0) {
            const symbol = collapseState[node.member_id] ? '+' : '−';
            toggleBtn = `<span class="tree-toggle" onclick="toggleCollapse(${node.member_id})">${symbol}</span>`;
        }

        return `<div class="family-unit">${memberCard}${spouseCard}${toggleBtn}</div>`;
    }

    // Render a member card with gender-based styling
    function renderMemberCard(m, isSpouse) {
        const genderClass = m.gender === 'M' ? 'male' : 'female';
        const genderIcon = m.gender === 'M' ? '♂' : '♀';
        let classes = `member-card ${genderClass}`;
        if (isSpouse) {
            classes += ' spouse-card';
            if (m.is_blood_member) {
                classes += ' blood-member';
            }
        }

        const lifespan = m.death_year
            ? `${m.birth_year || '?'}-${m.death_year}`
            : (m.birth_year ? `${m.birth_year}-` : '');

        const infoParts = [lifespan];
        if (isSpouse && m.marriage_year) {
            infoParts.push(`婚${m.marriage_year}`);
        }

        const title = isSpouse
            ? (m.is_blood_member ? '族内成员/配偶' : '配偶')
            : '';

        return `<span class="${classes}" title="${title}">`
            + `<span class="card-name">${genderIcon} ${m.name}</span>`
            + (infoParts.some(p => p) ? `<span class="card-info"> ${infoParts.filter(p => p).join(' ')}</span>` : '')
            + '</span>';
    }

    // ============ 权限管理 ============
    async function loadPermissions() {
        const data = await api(`/api/genealogies/${GENEALOGY_ID}/permissions`);
        const container = document.getElementById('permission-list');
        if (data.error) { container.innerHTML = `<div class="alert alert-warning">${data.error}</div>`; return; }
        if (!Array.isArray(data) || data.length === 0) {
            container.innerHTML = '<p class="text-muted">暂无权限记录</p>';
            return;
        }
        const roleNames = { 'admin': '1级-管理员', 'owner': '2级-所有者', 'editor': '3级-编辑者' };
        container.innerHTML = '<table class="table table-sm"><thead><tr><th>用户</th><th>权限级别</th><th>操作</th></tr></thead><tbody>'
            + data.map(p => `
                <tr>
                    <td>${p.username}</td>
                    <td>${roleNames[p.role] || p.role}</td>
                    <td><button class="btn btn-sm btn-outline-danger" onclick="revokePermission(${p.user_id})">撤销</button></td>
                </tr>
            `).join('') + '</tbody></table>';
    }

    async function grantPermission() {
        const username = document.getElementById('perm-username').value;
        const role = document.getElementById('perm-role').value;
        if (!username) { alert('请输入用户名'); return; }
        const result = await api(`/api/genealogies/${GENEALOGY_ID}/permissions`, 'POST', { username, role });
        if (result.error) { alert(result.error); return; }
        loadPermissions();
    }

    async function revokePermission(targetUserId) {
        if (!confirm('确定要撤销该用户的权限吗？')) return;
        const result = await api(`/api/genealogies/${GENEALOGY_ID}/permissions/${targetUserId}`, 'DELETE');
        if (result.error) { alert(result.error); return; }
        loadPermissions();
    }
</script>
{% endblock %}
